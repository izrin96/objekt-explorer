services:
  # background worker
  worker:
    restart: always
    build:
      context: .
      dockerfile: ./apps/worker/Dockerfile
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@pgbouncer:5432/main
      - INDEXER_DATABASE_URL=postgresql://postgres:postgres@pgbouncer-indexer:5432/indexer
      - REDIS_URL=redis://valkey:6379
      - S3_ENDPOINT
      - S3_ACCESS_KEY
      - S3_SECRET_KEY
      - S3_REGION
      - S3_BUCKET
      - S3_PUBLIC_URL
      - COSMO_KEY
    healthcheck:
      test: test ! -f /tmp/drain
      interval: 5s
      retries: 1

  # indexer processor
  processor:
    build:
      context: .
      dockerfile: apps/indexer/Dockerfile
    restart: always
    environment:
      - FORCE_PRETTY_LOGGER=${INDEXER_FORCE_PRETTY_LOGGER}
      - RPC_ENDPOINT=${INDEXER_RPC_ENDPOINT}
      - RPC_RATE_LIMIT=${INDEXER_RPC_RATE_LIMIT}
      - RPC_FINALITY=${INDEXER_RPC_FINALITY}
      - SQD_ENDPOINT=${INDEXER_SQD_ENDPOINT}
      - SQD_API_KEY=${INDEXER_SQD_API_KEY}
      - DB_URL=postgresql://postgres:postgres@postgres-indexer:5432/indexer
      - DB_NAME=indexer
      - DB_READ_USER=postgres-read
      - DB_READ_PASS=postgres-read
      - ENABLE_OBJEKTS=${INDEXER_ENABLE_OBJEKTS}
      - ENABLE_GRAVITY=${INDEXER_ENABLE_GRAVITY}
      - COSMO_PARALLEL_COUNT=${INDEXER_COSMO_PARALLEL_COUNT}
      - REDIS_URL=redis://valkey:6379

  # postgres database for indexer
  postgres-indexer:
    restart: always
    image: postgres:18
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_DB=indexer
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    healthcheck:
      test: "pg_isready -d indexer -U postgres"
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 80s
    volumes:
      - postgres-indexer-data:/var/lib/postgresql

  # pgbouncer for indexer
  pgbouncer-indexer:
    image: edoburu/pgbouncer:latest
    restart: always
    ports:
      - "5435:5432"
    environment:
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=postgres-indexer
      - DB_NAME=indexer
      - POOL_MODE=transaction
      - AUTH_TYPE=scram-sha-256
      - MAX_CLIENT_CONN=300
      - MIN_POOL_SIZE=5
      - DEFAULT_POOL_SIZE=20
      - RESERVE_POOL_SIZE=5
      - RESERVE_POOL_TIMEOUT=5
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost"]

  # website
  website:
    restart: always
    ports:
      - "3000:3000"
    build:
      context: .
      dockerfile: ./apps/website/Dockerfile
      secrets:
        - VITE_UMAMI_SCRIPT_URL
        - VITE_UMAMI_WEBSITE_ID
        - VITE_SITE_URL
        - VITE_LIVE_API_KEY
    environment:
      - VITE_UMAMI_SCRIPT_URL
      - VITE_UMAMI_WEBSITE_ID
      - BETTER_AUTH_SECRET
      - DISCORD_CLIENT_ID
      - DISCORD_CLIENT_SECRET
      - TWITTER_CLIENT_ID
      - TWITTER_CLIENT_SECRET
      - VITE_SITE_URL
      - DATABASE_URL
      - INDEXER_DATABASE_URL
      - S3_ENDPOINT
      - S3_ACCESS_KEY
      - S3_SECRET_KEY
      - S3_REGION
      - S3_BUCKET
      - S3_PUBLIC_URL
      - SES_REGION
      - SES_ACCESS_KEY
      - SES_SECRET_KEY
      - SES_MAIL_FROM
      - VITE_LIVE_API_KEY
      - BYPASS_LIVE_KEY
      - REDIS_URL=redis://valkey:6379
    healthcheck:
      test: test ! -f /tmp/drain && curl -f http://localhost:3000/api/healthcheck
      interval: 5s
      retries: 1

  # postgres database for web
  postgres:
    restart: always
    image: postgres:18
    volumes:
      - postgres-data:/var/lib/postgresql
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=main
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgbouncer for web
  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: always
    ports:
      - "5433:5432"
    environment:
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=postgres
      - DB_NAME=main
      - POOL_MODE=transaction
      - AUTH_TYPE=scram-sha-256
      - MAX_CLIENT_CONN=300
      - MIN_POOL_SIZE=5
      - DEFAULT_POOL_SIZE=20
      - RESERVE_POOL_SIZE=5
      - RESERVE_POOL_TIMEOUT=5
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost"]

  # redis compatible image
  valkey:
    restart: always
    image: valkey/valkey:latest
    ports:
      - "6379:6379"

volumes:
  postgres-data:
  postgres-indexer-data:

secrets:
  VITE_SITE_URL:
    environment: VITE_SITE_URL
  VITE_UMAMI_SCRIPT_URL:
    environment: VITE_UMAMI_SCRIPT_URL
  VITE_UMAMI_WEBSITE_ID:
    environment: VITE_UMAMI_WEBSITE_ID
  VITE_LIVE_API_KEY:
    environment: VITE_LIVE_API_KEY
