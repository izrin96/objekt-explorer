name: Docker CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      force_build_all:
        description: "Force build all apps regardless of changes"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      server: ${{ steps.filter.outputs.server }}
      worker: ${{ steps.filter.outputs.worker }}
      indexer: ${{ steps.filter.outputs.indexer }}
      packages: ${{ steps.filter.outputs.packages }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Detect changed paths
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            web:
              - 'apps/website/**'
              - 'packages/**'
              - 'turbo.json'
              - 'package.json'
              - 'bun.lock'
            server:
              - 'apps/server/**'
              - 'packages/**'
              - 'turbo.json'
              - 'package.json'
              - 'bun.lock'
            worker:
              - 'apps/worker/**'
              - 'packages/**'
              - 'turbo.json'
              - 'package.json'
              - 'bun.lock'
            indexer:
              - 'apps/indexer/**'
              - 'packages/**'
              - 'turbo.json'
              - 'package.json'
              - 'bun.lock'
            packages:
              - 'packages/**'

  validate:
    runs-on: ubuntu-latest
    needs: detect-changes
    # Only run validation if there are code changes
    if: |
      needs.detect-changes.outputs.web == 'true' ||
      needs.detect-changes.outputs.server == 'true' ||
      needs.detect-changes.outputs.worker == 'true' ||
      needs.detect-changes.outputs.indexer == 'true' ||
      needs.detect-changes.outputs.packages == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run linter
        run: bun run lint

      - name: Run type checking
        run: bun run typecheck

  build:
    runs-on: ubuntu-latest
    needs: [detect-changes, validate]
    # Only run if changes detected or if it's a manual trigger
    if: |
      always() &&
      (needs.validate.result == 'success' || needs.validate.result == 'skipped') &&
      (needs.detect-changes.outputs.web == 'true' ||
      needs.detect-changes.outputs.server == 'true' ||
      needs.detect-changes.outputs.worker == 'true' ||
      needs.detect-changes.outputs.indexer == 'true' ||
      github.event_name == 'workflow_dispatch')
    environment: ${{ github.event_name == 'pull_request' && 'Staging' || 'Production' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: web
            dockerfile: ./apps/website/Dockerfile
          - app: server
            dockerfile: ./apps/server/Dockerfile
          - app: worker
            dockerfile: ./apps/worker/Dockerfile
          - app: indexer
            dockerfile: ./apps/indexer/Dockerfile
    steps:
      - name: Show detected changes
        run: |
          echo "Changes detected for ${{ matrix.app }}: ${{ needs.detect-changes.outputs[matrix.app] }}"
          echo "Web changes: ${{ needs.detect-changes.outputs.web }}"
          echo "Server changes: ${{ needs.detect-changes.outputs.server }}"
          echo "Worker changes: ${{ needs.detect-changes.outputs.worker }}"
          echo "Indexer changes: ${{ needs.detect-changes.outputs.indexer }}"
          echo "Package changes: ${{ needs.detect-changes.outputs.packages }}"

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        if: needs.detect-changes.outputs[matrix.app] == 'true' || github.event.inputs.force_build_all == 'true'
        run: |
          # Generate tags based on event type
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            # PR tags: pr-123-sha, pr-123-latest
            echo "tags<<EOF" >> $GITHUB_OUTPUT
            echo "ghcr.io/${{ github.repository }}-${{ matrix.app }}:pr-${{ github.event.pull_request.number }}-${{ github.sha }}" >> $GITHUB_OUTPUT
            echo "ghcr.io/${{ github.repository }}-${{ matrix.app }}:pr-${{ github.event.pull_request.number }}-latest" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            # Main branch tags: sha, latest, short-sha
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "tags<<EOF" >> $GITHUB_OUTPUT
            echo "ghcr.io/${{ github.repository }}-${{ matrix.app }}:${{ github.sha }}" >> $GITHUB_OUTPUT
            echo "ghcr.io/${{ github.repository }}-${{ matrix.app }}:latest" >> $GITHUB_OUTPUT
            echo "ghcr.io/${{ github.repository }}-${{ matrix.app }}:${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Generate build secrets for ${{ matrix.app }}
        id: gen-secrets
        run: |
          if [ "${{ matrix.app }}" == "web" ]; then
            delimiter=$(uuidgen)
            echo "secrets<<$delimiter" >> "$GITHUB_OUTPUT"
            echo "VITE_SITE_URL=${{ secrets.VITE_SITE_URL }}" >> "$GITHUB_OUTPUT"
            echo "VITE_UMAMI_SCRIPT_URL=${{ secrets.VITE_UMAMI_SCRIPT_URL }}" >> "$GITHUB_OUTPUT"
            echo "VITE_UMAMI_WEBSITE_ID=${{ secrets.VITE_UMAMI_WEBSITE_ID }}" >> "$GITHUB_OUTPUT"
            echo "VITE_ACTIVITY_WEBSOCKET_URL=${{ secrets.VITE_ACTIVITY_WEBSOCKET_URL }}" >> "$GITHUB_OUTPUT"
            echo "VITE_LIVE_API_KEY=${{ secrets.VITE_LIVE_API_KEY }}" >> "$GITHUB_OUTPUT"
            echo "$delimiter" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push ${{ matrix.app }} docker image
        # Only build if this specific app has changes or force build is enabled
        if: needs.detect-changes.outputs[matrix.app] == 'true' || github.event.inputs.force_build_all == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          file: ${{ matrix.dockerfile }}
          # Only push to registry on main branch, not on PRs
          push: ${{ github.event_name != 'pull_request' }}
          # Load image locally on PRs for validation
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}-${{ matrix.app }}:buildcache
          cache-to: type=registry,mode=max,ref=ghcr.io/${{ github.repository }}-${{ matrix.app }}:buildcache
          secrets: ${{ steps.gen-secrets.outputs.secrets }}

      - name: Verify pushed image
        if: github.event_name != 'pull_request' && (needs.detect-changes.outputs[matrix.app] == 'true' || github.event.inputs.force_build_all == 'true')
        run: |
          docker pull ghcr.io/${{ github.repository }}-${{ matrix.app }}:latest
          echo "Image verified successfully"

  cleanup:
    runs-on: ubuntu-latest
    needs: [detect-changes, build]
    # Run cleanup only on main branch and only if build succeeded or was skipped
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      (needs.build.result == 'success' || needs.build.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        app: [web, server, worker, indexer]
    steps:
      - name: Delete all untagged ${{ matrix.app }} images
        if: needs.detect-changes.outputs[matrix.app] == 'true' || github.event.inputs.force_build_all == 'true'
        uses: actions/delete-package-versions@v5
        continue-on-error: true
        with:
          package-name: ${{ github.event.repository.name }}-${{ matrix.app }}
          package-type: container
          delete-only-untagged-versions: true
          min-versions-to-keep: 3

      - name: Cleanup old buildcache tags
        if: needs.detect-changes.outputs[matrix.app] == 'true' || github.event.inputs.force_build_all == 'true'
        continue-on-error: true
        shell: bash
        run: |
          owner="${{ github.repository_owner }}"
          pkg="${{ github.event.repository.name }}-${{ matrix.app }}"

          api_base="/users/${owner}"
          type=$(gh api "${api_base}" --jq '.type' 2>/dev/null || echo "User")
          if [ "$type" = "Organization" ]; then
            api_base="/orgs/${owner}"
          fi

          stale=$(gh api "${api_base}/packages/container/${pkg}/versions" \
            --jq '[.[] | select(.metadata.container.tags[]? | contains("buildcache")) | {id, created_at}] | sort_by(.created_at) | reverse | .[5:] | .[].id' \
            2>/dev/null || echo "")

          for id in $stale; do
            echo "Deleting stale buildcache version $id for $pkg"
            gh api -X DELETE "${api_base}/packages/container/${pkg}/versions/${id}" 2>/dev/null || true
          done
